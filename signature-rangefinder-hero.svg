<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <!-- Fairway Advisors · RangeFinder hero · locked palette only -->
  <!-- forest #2A3D2E · terracotta #C65D3A · taupe #7A6F5D · cream #F6EFE2 · ball-edge #A89E88 -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- concentric reticle rings (radar sweep) -->
    <g stroke="#2A3D2E">
      <circle cx="600" cy="600" r="512" stroke-width="2.5" opacity="0.12"/>
      <circle cx="600" cy="600" r="424" stroke-width="2.5" opacity="0.18"/>
      <circle cx="600" cy="600" r="336" stroke-width="2.5" opacity="0.26"/>
      <circle cx="600" cy="600" r="248" stroke-width="3"   opacity="0.34"/>
    </g>

    <!-- crosshair with centre gap -->
    <g stroke="#2A3D2E" stroke-width="2" opacity="0.28">
      <line x1="600" y1="96"  x2="600" y2="470"/>
      <line x1="600" y1="730" x2="600" y2="1104"/>
      <line x1="96"  y1="600" x2="470" y2="600"/>
      <line x1="730" y1="600" x2="1104" y2="600"/>
    </g>
    <!-- fine range ticks on axes -->
    <g stroke="#2A3D2E" stroke-width="2" opacity="0.35">
      <line x1="600" y1="176" x2="600" y2="200"/>
      <line x1="600" y1="288" x2="600" y2="312"/>
      <line x1="1000" y1="600" x2="976" y2="600"/>
      <line x1="888"  y1="600" x2="864" y2="600"/>
      <line x1="200" y1="600" x2="224" y2="600"/>
    </g>

    <!-- green slope contours (the zoomed green) -->
    <g stroke="#2A3D2E" opacity="0.3" stroke-width="2.5">
      <path d="M 300 720 Q 600 660 900 720"/>
      <path d="M 330 786 Q 600 726 870 786"/>
      <path d="M 372 852 Q 600 800 828 852"/>
    </g>

    <!-- terracotta target bracket framing the pin -->
    <g stroke="#C65D3A" stroke-width="6">
      <path d="M 456 452 L 456 500 M 456 452 L 504 452"/>
      <path d="M 744 452 L 744 500 M 744 452 L 696 452"/>
      <path d="M 456 748 L 456 700 M 456 748 L 504 748"/>
      <path d="M 744 748 L 744 700 M 744 748 L 696 748"/>
    </g>

    <!-- cup on the green -->
    <ellipse cx="600" cy="672" rx="26" ry="9" fill="#F6EFE2" stroke="#2A3D2E" stroke-width="4"/>

    <!-- pin + terracotta flag -->
    <line x1="600" y1="672" x2="600" y2="452" stroke="#2A3D2E" stroke-width="6"/>
    <path d="M 600 456 L 690 486 L 600 516 Z" fill="#C65D3A" stroke="#C65D3A" stroke-width="2"/>

    <!-- golf ball beside the cup (white, forest edge, faint dimples) -->
    <circle cx="666" cy="676" r="22" fill="#ffffff" stroke="#2A3D2E" stroke-width="4"/>
    <g fill="#2A3D2E" opacity="0.28" stroke="none">
      <circle cx="660" cy="670" r="2.4"/>
      <circle cx="672" cy="670" r="2.4"/>
      <circle cx="666" cy="680" r="2.4"/>
      <circle cx="654" cy="678" r="2.2"/>
      <circle cx="678" cy="678" r="2.2"/>
    </g>

    <!-- centre reticle dot -->
    <circle cx="600" cy="600" r="5" fill="#C65D3A" stroke="none"/>
  </g>

  <!-- mono readouts -->
  <g font-family="'DejaVu Sans Mono', ui-monospace, monospace">
    <!-- yards to pin (upper right) -->
    <text x="792" y="470" font-size="92" font-weight="700" fill="#2A3D2E" letter-spacing="2">142</text>
    <text x="794" y="506" font-size="24" fill="#7A6F5D" letter-spacing="6">YDS TO PIN</text>
    <!-- slope (lower left) -->
    <text x="248" y="792" font-size="64" font-weight="700" fill="#2A3D2E" letter-spacing="2">2.4%</text>
    <text x="250" y="826" font-size="22" fill="#7A6F5D" letter-spacing="5">SLOPE TO GREEN</text>
    <!-- top eyebrow -->
    <text x="600" y="150" font-size="24" fill="#C65D3A" letter-spacing="10" text-anchor="middle">RANGEFINDER</text>
    <!-- bottom label -->
    <text x="600" y="1076" font-size="22" fill="#7A6F5D" letter-spacing="8" text-anchor="middle">MEASURE BEFORE YOU SWING</text>
  </g>
</svg>
