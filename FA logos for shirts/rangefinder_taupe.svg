<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Fairway Advisors rangefinder mark">
  <!-- Fairway Advisors · miniature rangefinder · transparent background -->
  <g fill="none" stroke="#7a6f5d" stroke-width="8" stroke-linecap="round">
    <!-- scope ring -->
    <circle cx="100" cy="100" r="78" stroke-width="8"/>
    <!-- cardinal tick pips -->
    <line x1="100" y1="32"  x2="100" y2="50"/>
    <line x1="100" y1="150" x2="100" y2="168"/>
    <line x1="32"  y1="100" x2="50"  y2="100"/>
    <line x1="150" y1="100" x2="168" y2="100"/>
    <!-- hole rim -->
    <ellipse cx="100" cy="132" rx="30" ry="10.5" stroke-width="6"/>
    <!-- pin -->
    <line x1="100" y1="132" x2="100" y2="56" stroke-width="5"/>
  </g>
  <!-- flag -->
  <path d="M100,58 L142,74 L100,90 Z" fill="#8a2f37"/>
</svg>
