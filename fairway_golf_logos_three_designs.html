
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:1.5rem 0;">

      <path d="M 100,15 L 120,22 L 100,29 Z" fill="#c9882a" stroke="#c9882a" stroke-width="0.5"/>
